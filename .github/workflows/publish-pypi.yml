name: Release on main

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release tag from pyproject.toml
        id: meta
        run: |
          python <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          tag = f"v{version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"tag={tag}\n")
              fh.write(f"version={version}\n")
          print(f"Release tag from pyproject.toml: {tag}")
          PY

      - name: Create and push tag from pyproject (on main)
        id: tag_push
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git fetch origin --tags --quiet
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote — skip tag creation and PyPI (bump project.version to publish again)."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed ${TAG}"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Install build (PyPI)
        if: steps.tag_push.outputs.should_publish == 'true'
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        if: steps.tag_push.outputs.should_publish == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.tag_push.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
