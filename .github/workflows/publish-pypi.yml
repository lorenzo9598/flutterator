name: Release on main

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release tag from pyproject.toml
        id: meta
        run: |
          python <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          tag = f"v{version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"tag={tag}\n")
              fh.write(f"version={version}\n")
          print(f"Release tag from pyproject.toml: {tag}")
          PY

      - name: Create and push tag from pyproject (on main)
        id: tag_push
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git fetch origin --tags --quiet
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote — skip release (bump project.version to publish again)."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed ${TAG}"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Install build (PyPI)
        if: steps.tag_push.outputs.should_publish == 'true'
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        if: steps.tag_push.outputs.should_publish == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.tag_push.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Sync extension version from pyproject.toml
        if: steps.tag_push.outputs.should_publish == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const p = 'vscode-extension/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Setup Node.js
        if: steps.tag_push.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Publish extension (VS Code + Open VSX)
        if: steps.tag_push.outputs.should_publish == 'true'
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npm ci
          npx @vscode/vsce publish -p "$VSCE_PAT"
          npx ovsx publish -p "$OVSX_PAT"
